pack_id: django-v3-to-v4
version: "1.0.0"
display_name: "Django v3 → v4"
description: >
  Detects Django v3.x usage patterns and produces an evidence-backed migration
  plan for upgrading to Django v4.x.  Covers URL configuration changes,
  timezone-aware datetime handling, database connection changes, form API
  updates, and removed deprecated features.

# Multi-language support fields (ADR-0006)
language: python
analyzer_kind: regex

source_package: django
source_major: 3
target_major: 4

supported_manifest_formats:
  - requirements.txt
  - pyproject.toml-pep621
  - pyproject.toml-poetry

supported_syntax_versions:
  - "3.8"
  - "3.9"
  - "3.10"
  - "3.11"
  - "3.12"

curated_source_snapshot_version: "1.0.0"
detector_version: "1.0.0"
scoring_version: "1.0.0"

prompt_versions:
  documentation_research: "1.0.0"
  compatibility_interpretation: "1.0.0"
  migration_planning: "1.0.0"
  evidence_critic: "1.0.0"

required_files:
  - applicability.yaml
  - detection_rules.yaml
  - risk_rules.yaml
  - trusted_sources.yaml
  - validation_rules.yaml
  - prompts/documentation_research.md
  - prompts/compatibility_interpretation.md
  - prompts/migration_planning.md
  - prompts/evidence_critic.md
