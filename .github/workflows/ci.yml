name: CI

on:
  push:
    branches: [main, "milestone/*"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Format / Lint / Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.29"
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.29"
      - run: uv sync --frozen
      - run: uv run pytest -m "not network and not langsmith and not slow"

  build:
    name: Build containers
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Copy env example
        run: cp .env.example .env
      - name: Build API image
        run: docker build --target runtime -t upgradepilot-api:ci .
      - name: Build UI image
        run: docker build -f Dockerfile.ui --target runtime -t upgradepilot-ui:ci .
      - name: Validate Compose config
        run: docker compose config --quiet

  security:
    name: Local security and SBOM checks
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.29"
      - run: uv sync --frozen
      - name: Release security scan
        run: uv run python scripts/security_scan.py --markdown-output docs/security/SECURITY_SCAN_RESULTS.md
      - name: Generate SBOM
        run: uv run python scripts/generate_sbom.py --output docs/security/sbom.cdx.json

  eval:
    name: LLM eval gates
    runs-on: ubuntu-latest
    needs: test
    env:
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: upgradepilot-eval
      LANGSMITH_TRACING: "false"
      UPGRADEPILOT_ENV: eval
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.29"
      - run: uv sync --frozen
      - name: Run benchmark evals (fixture mode, fail under 0.7)
        run: uv run python evals/run_evals.py --fail-under 0.7
