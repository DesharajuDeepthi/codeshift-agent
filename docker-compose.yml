# WARNING: The default credential values below (POSTGRES_USER, POSTGRES_PASSWORD,
# POSTGRES_DB, GRAFANA_ADMIN_PASSWORD) are local development defaults ONLY.
# They MUST be overridden via environment variables or a secrets manager before
# running in any shared, staging, or production environment.
# Set each variable in your shell or in a .env file before running docker compose.

services:

  # ── API (FastAPI + LangGraph) ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: upgradepilot-api:dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-upgradepilot}:${POSTGRES_PASSWORD:-upgradepilot}@postgres:5432/${POSTGRES_DB:-upgradepilot}"
      REDIS_URL: redis://redis:6379/0
      UPGRADEPILOT_GIT_SHA: "${UPGRADEPILOT_GIT_SHA:-unknown}"
    ports:
      - "8000:8000"
    volumes:
      - workspace:/workspace
    networks:
      - upgradepilot-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── UI (Streamlit) ──────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: upgradepilot-ui:dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
      UPGRADEPILOT_GIT_SHA: "${UPGRADEPILOT_GIT_SHA:-unknown}"
    ports:
      - "8501:8501"
    networks:
      - upgradepilot-net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Override POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB in .env or
      # the shell before running in any non-local environment.
      POSTGRES_USER: "${POSTGRES_USER:-upgradepilot}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-upgradepilot}"
      POSTGRES_DB: "${POSTGRES_DB:-upgradepilot}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - upgradepilot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upgradepilot} -d ${POSTGRES_DB:-upgradepilot}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks:
      - upgradepilot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - upgradepilot-net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      # Override GRAFANA_ADMIN_PASSWORD in .env or the shell before any non-local use.
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - upgradepilot-net
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  workspace:

networks:
  upgradepilot-net:
    driver: bridge
